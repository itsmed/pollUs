sonar.projectKey=itsmed_votr
sonar.projectName=Votr

# Source directories — non-test production code
sonar.sources=client/src,client/components,server

# Exclude generated, dependency, and mobile-only directories from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/build/**,mobile/**

# Files that are test code (reported separately by SonarQube)
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage reports (lcov format) produced by vitest --coverage and jest --coverage
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info
