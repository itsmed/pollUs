name: Client CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "client/**"
      - "packages/shared/**"
      - ".github/workflows/client.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "client/**"
      - "packages/shared/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  build:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
