services:
  db:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-votr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-votr_dev}
      POSTGRES_DB: ${POSTGRES_DB:-votr_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-votr}']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-votr}:${POSTGRES_PASSWORD:-votr_dev}@db:5432/${POSTGRES_DB:-votr_dev}
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - server
    command: npm run dev

volumes:
  postgres_data:
